<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRENDY — 유튜브 급상승 순위</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810; --surface:#10101e; --surface2:#181828; --surface3:#1e1e32;
  --border:#252540; --yt:#ff0000; --yt2:#ff4444; --accent2:#ffb800;
  --accent3:#00d4ff; --text:#eeeef8; --text-dim:#6060a0; --text-mid:#9090c0;
  --gold:#ffd700; --silver:#b0b0c8; --bronze:#cd7f32; --up:#00e87a; --down:#ff4466;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(255,0,0,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,184,0,.04) 0%,transparent 50%);pointer-events:none;z-index:0;animation:bgshift 20s ease-in-out infinite alternate}
@keyframes bgshift{0%{transform:translate(0,0)}100%{transform:translate(2%,2%)}}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(8,8,16,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(90deg,var(--yt),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px}
.live-pill{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--yt);border:1px solid rgba(255,0,0,.25);padding:5px 12px;border-radius:20px;background:rgba(255,0,0,.05)}
.pulse-dot{width:7px;height:7px;background:var(--yt);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* HERO */
.hero{padding:36px 28px 28px;border-bottom:1px solid var(--border);position:relative;z-index:1}
.hero h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(36px,6vw,68px);line-height:1;letter-spacing:-2px}
.hero h1 .hl{background:linear-gradient(135deg,var(--yt),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{margin-top:10px;color:var(--text-dim);font-size:13px}
.hero-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 12px;border-radius:20px;font-family:'Space Mono',monospace}
.pill-red{background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.2);color:var(--yt2)}
.pill-yellow{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);color:var(--accent2)}
.pill-blue{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--accent3)}

/* COUNTRY BAR */
.country-bar{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto;scrollbar-width:none;background:rgba(8,8,16,.6)}
.country-bar::-webkit-scrollbar{display:none}
.country-bar-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-right:16px;flex-shrink:0}
.country-tabs{display:flex;gap:6px;padding:10px 0}
.country-tab{display:flex;align-items:center;gap:7px;flex-shrink:0;padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;transition:all .2s}
.country-tab:hover{border-color:rgba(255,0,0,.4);color:var(--text)}
.country-tab.active{border-color:var(--yt);background:rgba(255,0,0,.1);color:#fff}
.country-flag{font-size:18px;line-height:1}

/* CATEGORY TABS */
.cat-bar{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-bar-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-right:16px;flex-shrink:0}
.cat-tabs{display:flex;gap:6px;padding:10px 0}
.cat-tab{flex-shrink:0;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.cat-tab:hover{border-color:rgba(255,0,0,.4);color:var(--text)}
.cat-tab.active{border-color:var(--yt);background:rgba(255,0,0,.1);color:#fff}

/* STATS */
.stats-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-item{flex-shrink:0;padding:14px 28px;border-right:1px solid var(--border);text-align:center}
.stat-val{font-family:'Black Han Sans',sans-serif;font-size:22px;background:linear-gradient(135deg,var(--yt),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:2px;letter-spacing:1px}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:18px;display:flex;align-items:center;gap:8px}
.update-badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-dim);cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;transition:all .2s}
.refresh-btn:hover{border-color:var(--yt);color:var(--yt)}
.refresh-btn.loading{pointer-events:none;opacity:.5}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATUS */
.status-bar{display:none;align-items:center;gap:8px;padding:12px 28px;background:rgba(255,0,0,.04);border-bottom:1px solid rgba(255,0,0,.1);font-size:12px;color:var(--yt2);font-family:'Space Mono',monospace}
.status-bar.on{display:flex}
.status-spin{width:12px;height:12px;border:2px solid rgba(255,0,0,.2);border-top-color:var(--yt);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}

/* VIDEO LIST */
.video-section{padding:20px 28px 60px;position:relative;z-index:1;overflow-x:hidden}
.video-list{display:flex;flex-direction:column;gap:8px}

/* VIDEO CARD */
.yt-card{
  display:grid;grid-template-columns:48px 200px 1fr;
  align-items:stretch;gap:0;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:all .25s;cursor:pointer;
  animation:itemIn .4s ease forwards;opacity:0;
}
.yt-card:hover{border-color:rgba(255,0,0,.4);background:var(--surface2);transform:translateX(3px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.yt-card:hover{border-color:rgba(255,0,0,.35);background:var(--surface2);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
@keyframes itemIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.yt-card:nth-child(1){animation-delay:.04s}.yt-card:nth-child(2){animation-delay:.08s}.yt-card:nth-child(3){animation-delay:.12s}.yt-card:nth-child(4){animation-delay:.16s}.yt-card:nth-child(5){animation-delay:.20s}.yt-card:nth-child(6){animation-delay:.24s}.yt-card:nth-child(7){animation-delay:.28s}.yt-card:nth-child(8){animation-delay:.32s}.yt-card:nth-child(9){animation-delay:.36s}.yt-card:nth-child(10){animation-delay:.40s}.yt-card:nth-child(11){animation-delay:.44s}.yt-card:nth-child(12){animation-delay:.48s}.yt-card:nth-child(13){animation-delay:.52s}.yt-card:nth-child(14){animation-delay:.56s}.yt-card:nth-child(15){animation-delay:.60s}.yt-card:nth-child(16){animation-delay:.64s}.yt-card:nth-child(17){animation-delay:.68s}.yt-card:nth-child(18){animation-delay:.72s}.yt-card:nth-child(19){animation-delay:.76s}.yt-card:nth-child(20){animation-delay:.80s}
.yt-card.r1{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.02)}
.yt-card.r2{border-color:rgba(192,192,200,.2)}.yt-card.r3{border-color:rgba(205,127,50,.2)}

/* 순위 번호 */
.yt-rank{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px;flex-shrink:0;border-right:1px solid var(--border)}
.yt-rank-num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
.yt-card.r1 .yt-rank-num{color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.5)}
.yt-card.r2 .yt-rank-num{color:var(--silver)}.yt-card.r3 .yt-rank-num{color:var(--bronze)}
.yt-medal{font-size:22px}

/* 썸네일 */
.yt-thumb-wrap{position:relative;flex-shrink:0}
.yt-thumb{width:200px;height:113px;object-fit:cover;display:block;background:var(--surface2)}
.yt-duration{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.88);color:#fff;font-family:'Space Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.yt-thumb-ph{width:200px;height:113px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}

/* 정보 */
.yt-info{min-width:0;padding:12px 16px;display:flex;flex-direction:column;justify-content:space-between}
.yt-title{font-weight:700;font-size:14px;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.yt-channel{font-size:12px;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.yt-channel-dot{width:3px;height:3px;background:var(--text-dim);border-radius:50%;flex-shrink:0}
.yt-stats-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.yt-stat-chip{display:flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.yt-stat-chip .lbl{font-size:9px;color:var(--text-dim);font-weight:400}
.yt-views-num{color:var(--text);font-size:13px}
.yt-likes-num{color:var(--up)}
.yt-spike-num{color:var(--yt2)}
.yt-tags{display:flex;gap:5px;flex-wrap:wrap}
.yt-badge{font-family:'Space Mono',monospace;font-size:9px;padding:2px 7px;border-radius:6px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.15);color:var(--yt2)}

/* VIEW MODE TABS */
.view-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 28px;background:rgba(8,8,16,.6)}
.view-tabs{display:flex;gap:0}
.view-tab{padding:12px 24px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Black Han Sans',sans-serif;font-size:14px;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.view-tab:hover{color:var(--text)}
.view-tab.active{color:var(--yt);border-bottom-color:var(--yt)}

/* CHANNEL CARD */
.ch-list{display:flex;flex-direction:column;gap:8px}
.ch-card{display:grid;grid-template-columns:56px 64px 1fr auto;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;transition:all .25s;cursor:pointer;animation:itemIn .4s ease forwards;opacity:0}
.ch-card:hover{border-color:rgba(255,0,0,.35);background:var(--surface2);transform:translateX(3px)}
.ch-card:nth-child(1){animation-delay:.04s}.ch-card:nth-child(2){animation-delay:.08s}.ch-card:nth-child(3){animation-delay:.12s}.ch-card:nth-child(4){animation-delay:.16s}.ch-card:nth-child(5){animation-delay:.20s}.ch-card:nth-child(6){animation-delay:.24s}.ch-card:nth-child(7){animation-delay:.28s}.ch-card:nth-child(8){animation-delay:.32s}.ch-card:nth-child(9){animation-delay:.36s}.ch-card:nth-child(10){animation-delay:.40s}
.ch-card.r1{border-color:rgba(255,215,0,.25);background:rgba(255,215,0,.02)}
.ch-card.r2{border-color:rgba(192,192,200,.2)}.ch-card.r3{border-color:rgba(205,127,50,.2)}
.ch-rank{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;text-align:center}
.ch-card.r1 .ch-rank{color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.5)}
.ch-card.r2 .ch-rank{color:var(--silver)}.ch-card.r3 .ch-rank{color:var(--bronze)}
.ch-medal{font-size:26px}
.ch-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--surface2);border:2px solid var(--border);flex-shrink:0}
.ch-avatar-ph{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--yt),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ch-info{min-width:0}
.ch-name{font-weight:700;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{font-size:12px;color:var(--text-dim);margin-bottom:6px}
.ch-tags{display:flex;gap:5px;flex-wrap:wrap}
.ch-badge{font-family:'Space Mono',monospace;font-size:9px;padding:2px 7px;border-radius:6px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.15);color:var(--yt2)}
.ch-stats{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:100px}
.ch-views{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.ch-views-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim)}
.ch-video-count{font-size:11px;color:var(--accent3);font-family:'Space Mono',monospace}
.ch-heat{display:flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.2);color:var(--yt2)}

@media(max-width:768px){
  .view-bar{padding:0 12px}
  .view-tab{padding:10px 16px;font-size:13px}
  .ch-card{grid-template-columns:40px 48px 1fr}
  .ch-stats{display:none}
  .ch-avatar{width:48px;height:48px}
  .ch-avatar-ph{width:48px;height:48px;font-size:18px}
}
.skel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 16px;display:grid;grid-template-columns:52px 160px 1fr 90px;gap:14px;align-items:center;margin-bottom:10px}
.sk{background:var(--border);border-radius:6px;animation:shim 1.5s infinite}
@keyframes shim{0%,100%{opacity:.3}50%{opacity:.7}}
.err-box{background:rgba(255,0,0,.05);border:1px solid rgba(255,0,0,.2);border-radius:14px;padding:28px;text-align:center;color:var(--text-dim)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);padding:12px 24px;border-radius:30px;font-size:13px;font-weight:500;z-index:2000;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  header{padding:0 16px}
  .hero{padding:24px 16px 20px}
  .hero h1{font-size:32px}
  .controls,.video-section{padding-left:12px;padding-right:12px}
  .country-bar,.cat-bar{padding-left:12px;padding-right:12px}
  .stat-item{padding:10px 14px}
  .stat-val{font-size:16px}

  /* 모바일: 세로 카드 그리드 */
  .video-list{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .yt-card{
    display:flex;
    flex-direction:column;
    grid-template-columns:unset;
    padding:0;
    border-radius:12px;
    overflow:hidden;
    position:relative;
  }

  /* 순위 뱃지 - 썸네일 위에 겹치게 */
  .yt-rank{
    position:absolute;
    top:6px;left:6px;
    z-index:10;
    background:rgba(0,0,0,.75);
    border-radius:8px;
    padding:3px 8px;
    border:none;
    width:auto;
    height:auto;
  }
  .yt-rank-num{font-size:13px}
  .yt-medal{font-size:16px}

  /* 썸네일 꽉 채우기 */
  .yt-thumb-wrap{position:relative;width:100%;flex-shrink:0}
  .yt-thumb{width:100%;height:110px;object-fit:cover;display:block}
  .yt-thumb-ph{width:100%;height:110px;font-size:24px}
  .yt-duration{font-size:9px;padding:1px 4px}

  /* 정보 영역 */
  .yt-info{
    padding:8px 10px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .yt-title{font-size:12px;line-height:1.3;margin-bottom:2px;-webkit-line-clamp:2}
  .yt-channel{font-size:10px;margin-bottom:4px;gap:4px}
  .yt-stats-row{gap:6px;margin-bottom:4px}
  .yt-stat-chip{font-size:10px}
  .yt-views-num{font-size:11px}
  .yt-tags{gap:3px}
  .yt-badge{font-size:8px;padding:1px 5px}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">TRENDY</div>
    <div class="logo-sub">유튜브 급상승 실시간 순위</div>
  </div>
  <div class="live-pill"><div class="pulse-dot"></div>LIVE</div>
</header>

<div class="hero">
  <h1>유튜브 <span class="hl">급상승</span><br>동영상 순위</h1>
  <p class="hero-sub">YouTube Data API 기반 실시간 급상승 동영상 랭킹 📊</p>
  <div class="hero-pills">
    <span class="pill pill-red">▶ 실제 유튜브 데이터</span>
    <span class="pill pill-yellow">🔥 조회수 급등 순위</span>
    <span class="pill pill-blue">🌍 8개국 제공</span>
  </div>
</div>

<!-- VIEW MODE -->
<div class="view-bar">
  <div class="view-tabs">
    <button class="view-tab active" id="vtab-video" onclick="setViewMode('video')">▶ 영상 순위</button>
    <button class="view-tab" id="vtab-channel" onclick="setViewMode('channel')">🔥 HOT 채널</button>
    <button class="view-tab" id="vtab-subs" onclick="setViewMode('subs')">👑 구독자 순위</button>
  </div>
</div>

<!-- 국가 선택 -->
<div class="country-bar">
  <span class="country-bar-label">🌍 국가</span>
  <div class="country-tabs" id="countryTabs"></div>
</div>

<!-- 카테고리 선택 -->
<div class="cat-bar">
  <span class="cat-bar-label">📂 카테고리</span>
  <div class="cat-tabs" id="catTabs"></div>
</div>

<!-- 통계 -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-val" id="statVideos">-</div><div class="stat-label">VIDEOS</div></div>
  <div class="stat-item"><div class="stat-val" id="statViews">-</div><div class="stat-label">TOTAL VIEWS</div></div>
  <div class="stat-item"><div class="stat-val" id="statRegion">-</div><div class="stat-label">REGION</div></div>
  <div class="stat-item"><div class="stat-val" id="statTime">-</div><div class="stat-label">UPDATED</div></div>
</div>

<!-- 상태바 -->
<div class="status-bar" id="statusBar"><div class="status-spin"></div><span id="statusTxt">유튜브 데이터 가져오는 중...</span></div>

<!-- 컨트롤 -->
<div class="controls">
  <div class="section-title" id="sectionTitle">🇰🇷 한국 전체 급상승</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="update-badge" id="updateBadge">-</div>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      새로고침
    </button>
  </div>
</div>

<!-- 영상 목록 -->
<div class="video-section">
  <div class="video-list" id="videoList"></div>
  <div class="ch-list" id="chList" style="display:none"></div>
  <div class="ch-list" id="subsList" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let viewMode = 'video';

function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('vtab-' + mode).classList.add('active');
  document.getElementById('videoList').style.display = 'none';
  document.getElementById('chList').style.display = 'none';
  document.getElementById('subsList').style.display = 'none';
  if (mode === 'video') {
    document.getElementById('videoList').style.display = '';
    fetchVideos();
  } else if (mode === 'channel') {
    document.getElementById('chList').style.display = '';
    fetchChannels();
  } else if (mode === 'subs') {
    document.getElementById('subsList').style.display = '';
    fetchSubscribers();
  }
}

async function fetchChannels() {
  const ckey = 'ch_' + activeCountry.code + '_' + activeCat.id;
  if (cache[ckey]) { renderChannels(cache[ckey]); return; }
  showChSkel();
  document.getElementById('refreshBtn').classList.add('loading');
  document.getElementById('statusBar').classList.add('on');
  document.getElementById('statusTxt').textContent = `📺 ${activeCountry.flag} 채널 순위 분석 중...`;
  try {
    const res = await fetch(`/api/youtube?region=${activeCountry.code}&categoryId=${activeCat.id}`);
    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error('No data');
    const chMap = {};
    data.items.forEach(item => {
      const s = item.snippet, st = item.statistics || {};
      const cid = s.channelId;
      const views = parseInt(st.viewCount || 0);
      const likes = parseInt(st.likeCount || 0);
      if (!chMap[cid]) chMap[cid] = {id:cid, name:s.channelTitle, thumb:s.thumbnails?.default?.url||'', totalViews:0, totalLikes:0, videoCount:0};
      chMap[cid].totalViews += views;
      chMap[cid].totalLikes += likes;
      chMap[cid].videoCount++;
    });
    const channels = Object.values(chMap).sort((a,b) => b.totalViews - a.totalViews).slice(0, 15);
    cache[ckey] = channels;
    renderChannels(channels);
  } catch(e) {
    document.getElementById('chList').innerHTML = `<div class="err-box"><div style="font-size:32px;margin-bottom:8px">⚠️</div><p>채널 데이터를 불러오지 못했어요.</p></div>`;
  } finally {
    document.getElementById('refreshBtn').classList.remove('loading');
    document.getElementById('statusBar').classList.remove('on');
  }
}

function renderChannels(channels) {
  const medals = ['🥇','🥈','🥉'];
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('chList').innerHTML = channels.map((ch,i) => `
    <div class="ch-card r${i<3?i+1:''}" onclick="window.open('https://youtube.com/channel/${ch.id}','_blank')">
      <div class="ch-rank">${i<3?`<span class="ch-medal">${medals[i]}</span>`:`#${i+1}`}</div>
      ${ch.thumb ? `<img class="ch-avatar" src="${ch.thumb}" onerror="this.style.display='none'" loading="lazy">` : `<div class="ch-avatar-ph">📺</div>`}
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-meta">급상승 영상 ${ch.videoCount}개 · 👍 ${fmt(ch.totalLikes)}</div>
        <div class="ch-tags">
          ${ch.videoCount >= 3 ? '<span class="ch-badge">🔥 HOT</span>' : ''}
          <span class="ch-badge">급상승</span>
        </div>
      </div>
      <div class="ch-stats">
        <div><div class="ch-views">${fmt(ch.totalViews)}</div><div class="ch-views-label">TOTAL VIEWS</div></div>
        <div class="ch-video-count">📹 ${ch.videoCount}개 영상</div>
        <div class="ch-heat">🔥 평균 ${fmt(Math.round(ch.totalViews/ch.videoCount))}/편</div>
      </div>
    </div>`).join('');
  document.getElementById('sectionTitle').textContent = `${activeCountry.flag} ${activeCountry.name} 채널 순위`;
  document.getElementById('updateBadge').textContent = now + ' 기준';
  document.getElementById('statVideos').textContent = channels.length;
  document.getElementById('statViews').textContent = fmt(channels.reduce((s,c)=>s+c.totalViews,0));
  document.getElementById('statRegion').textContent = activeCountry.flag + ' ' + activeCountry.name;
  document.getElementById('statTime').textContent = now;
}

function showChSkel() {
  document.getElementById('chList').innerHTML = Array(8).fill(0).map(()=>`
    <div class="skel" style="grid-template-columns:56px 64px 1fr 100px">
      <div class="sk" style="height:24px;width:36px;margin:auto"></div>
      <div class="sk" style="height:56px;border-radius:50%"></div>
      <div><div class="sk" style="height:15px;width:60%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:80%"></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="sk" style="height:18px;width:70px"></div><div class="sk" style="height:12px;width:50px"></div></div>
    </div>`).join('');
}

const COUNTRIES = [
  {code:'KR', flag:'🇰🇷', name:'한국'},
  {code:'US', flag:'🇺🇸', name:'미국'},
  {code:'JP', flag:'🇯🇵', name:'일본'},
  {code:'GB', flag:'🇬🇧', name:'영국'},
  {code:'IN', flag:'🇮🇳', name:'인도'},
  {code:'BR', flag:'🇧🇷', name:'브라질'},
  {code:'DE', flag:'🇩🇪', name:'독일'},
  {code:'FR', flag:'🇫🇷', name:'프랑스'},
];

const CATEGORIES = [
  {id:'0', name:'전체'},
  {id:'10', name:'🎵 음악'},
  {id:'20', name:'🎮 게임'},
  {id:'22', name:'🎭 엔터'},
  {id:'23', name:'😂 코미디'},
  {id:'17', name:'⚽ 스포츠'},
  {id:'28', name:'🔬 과학'},
  {id:'25', name:'📰 뉴스'},
  {id:'24', name:'🎬 영화'},
];

let activeCountry = COUNTRIES[0];
let activeCat = CATEGORIES[0];
const cache = {};

// 국가 탭 생성
const countryTabsEl = document.getElementById('countryTabs');
COUNTRIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'country-tab' + (c.code==='KR'?' active':'');
  b.id = 'ctab-'+c.code;
  b.innerHTML = `<span class="country-flag">${c.flag}</span>${c.name}`;
  b.onclick = () => {
    activeCountry = c;
    document.querySelectorAll('.country-tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    // 캐시 초기화 후 현재 탭에 맞게 호출
    const vkey = c.code + '_' + activeCat.id;
    delete cache[vkey];
    delete cache['ch_' + vkey];
    delete cache['subs_' + vkey];
    if (viewMode === 'video') fetchVideos();
    else if (viewMode === 'channel') fetchChannels();
    else fetchSubscribers();
  };
  countryTabsEl.appendChild(b);
});

// 카테고리 탭 생성
const catTabsEl = document.getElementById('catTabs');
CATEGORIES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'cat-tab' + (c.id==='0'?' active':'');
  b.id = 'cattab-'+c.id;
  b.textContent = c.name;
  b.onclick = () => {
    activeCat = c;
    document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const vkey = activeCountry.code + '_' + c.id;
    delete cache[vkey];
    delete cache['ch_' + vkey];
    delete cache['subs_' + vkey];
    if (viewMode === 'video') fetchVideos();
    else if (viewMode === 'channel') fetchChannels();
    else fetchSubscribers();
  };
  catTabsEl.appendChild(b);
});

async function fetchVideos() {
  const ckey = activeCountry.code + '_' + activeCat.id;
  if (cache[ckey]) { renderVideos(cache[ckey]); return; }

  showSkel();
  document.getElementById('refreshBtn').classList.add('loading');
  document.getElementById('statusBar').classList.add('on');
  document.getElementById('statusTxt').textContent = `📡 ${activeCountry.flag} ${activeCountry.name} 급상승 데이터 가져오는 중...`;

  try {
    let url = `/api/youtube?region=${activeCountry.code}&categoryId=${activeCat.id}`;
    const res = await fetch(url);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'API Error');
    }

    const data = await res.json();
    if (!data.items || !data.items.length) {
      document.getElementById('videoList').innerHTML = `<div class="err-box"><div style="font-size:32px;margin-bottom:8px">😶</div><p>해당 카테고리에 급상승 영상이 없어요.</p></div>`;
      return;
    }

    cache[ckey] = data.items;
    renderVideos(data.items);
  } catch(e) {
    document.getElementById('videoList').innerHTML = `<div class="err-box"><div style="font-size:32px;margin-bottom:8px">⚠️</div><p>데이터를 불러오지 못했어요.<br>YouTube API 키를 확인해주세요.<br><small style="font-size:11px;opacity:.6">${e.message}</small></p></div>`;
  } finally {
    document.getElementById('refreshBtn').classList.remove('loading');
    document.getElementById('statusBar').classList.remove('on');
  }
}

function renderVideos(items) {
  const medals = ['🥇','🥈','🥉'];
  let totalViews = 0;

  document.getElementById('videoList').innerHTML = items.slice(0,20).map((item, i) => {
    const s = item.snippet, st = item.statistics||{}, cd = item.contentDetails||{};
    const views = parseInt(st.viewCount||0);
    const likes = parseInt(st.likeCount||0);
    totalViews += views;
    const thumb = s.thumbnails?.medium?.url || '';
    const dur = parseDur(cd.duration||'');
    const hoursAgo = (Date.now() - new Date(s.publishedAt)) / 3600000;
    const vph = hoursAgo > 0 ? Math.round(views/hoursAgo) : 0;
    const spike = vph > 1000 ? fmt(vph)+'/hr' : null;

    return `
    <div class="yt-card r${i<3?i+1:''}" onclick="window.open('https://youtube.com/watch?v=${item.id}','_blank')">
      <div class="yt-rank">
        <div class="yt-rank-num">${i<3?`<span class="yt-medal">${medals[i]}</span>`:`#${i+1}`}</div>
      </div>
      ${thumb
        ? `<div class="yt-thumb-wrap"><img class="yt-thumb" src="${thumb}" loading="lazy" onerror="this.style.display='none'">${dur?`<span class="yt-duration">${dur}</span>`:''}</div>`
        : `<div class="yt-thumb-ph">▶</div>`
      }
      <div class="yt-info">
        <div>
          <div class="yt-title">${esc(s.title)}</div>
          <div class="yt-channel">
            ${esc(s.channelTitle)}
            <span class="yt-channel-dot"></span>
            ${ago(s.publishedAt)}
          </div>
        </div>
        <div>
          <div class="yt-stats-row">
            <div class="yt-stat-chip">
              <span class="yt-views-num">${fmt(views)}</span>
              <span class="lbl">VIEWS</span>
            </div>
            <div class="yt-stat-chip">
              <span class="yt-likes-num">👍 ${fmt(likes)}</span>
            </div>
            ${spike ? `<div class="yt-stat-chip"><span class="yt-spike-num">🔥 ${spike}</span></div>` : ''}
          </div>
          <div class="yt-tags">${(s.tags||[]).slice(0,3).map(t=>`<span class="yt-badge">${esc(t)}</span>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('statVideos').textContent = Math.min(items.length, 20);
  document.getElementById('statViews').textContent = fmt(totalViews);
  document.getElementById('statRegion').textContent = activeCountry.flag + ' ' + activeCountry.name;
  document.getElementById('statTime').textContent = now;
  document.getElementById('sectionTitle').textContent = `${activeCountry.flag} ${activeCountry.name} ${activeCat.name} 급상승`;
  document.getElementById('updateBadge').textContent = now + ' 기준';
}

function showSkel() {
  document.getElementById('videoList').innerHTML = Array(10).fill(0).map(()=>`
    <div class="skel">
      <div class="sk" style="height:24px;width:36px;margin:auto"></div>
      <div class="sk" style="height:90px;border-radius:8px"></div>
      <div><div class="sk" style="height:14px;width:75%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:50%;margin-bottom:8px"></div><div class="sk" style="height:20px;width:30%"></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="sk" style="height:18px;width:70px"></div><div class="sk" style="height:14px;width:50px"></div></div>
    </div>`).join('');
}

async function fetchSubscribers() {
  const ckey = 'subs_' + activeCountry.code + '_' + activeCat.id;
  if (cache[ckey]) { renderSubscribers(cache[ckey]); return; }
  document.getElementById('subsList').innerHTML = Array(8).fill(0).map(()=>`
    <div class="skel" style="grid-template-columns:56px 64px 1fr 100px">
      <div class="sk" style="height:24px;width:36px;margin:auto"></div>
      <div class="sk" style="height:56px;border-radius:50%"></div>
      <div><div class="sk" style="height:15px;width:60%;margin-bottom:8px"></div><div class="sk" style="height:11px;width:80%"></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="sk" style="height:18px;width:70px"></div><div class="sk" style="height:12px;width:50px"></div></div>
    </div>`).join('');
  document.getElementById('refreshBtn').classList.add('loading');
  document.getElementById('statusBar').classList.add('on');
  document.getElementById('statusTxt').textContent = `👑 ${activeCountry.flag} 구독자 순위 분석 중...`;
  try {
    // 급상승 영상에서 채널 ID 수집
    const res = await fetch(`/api/youtube?region=${activeCountry.code}&categoryId=${activeCat.id}`);
    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error('No data');

    // 중복 없이 채널 ID 수집
    const channelIds = [...new Set(data.items.map(i => i.snippet.channelId))];

    // 채널 상세 정보 (구독자 수 포함) 가져오기
    const chRes = await fetch(`/api/youtube?channelIds=${channelIds.join(',')}`);
    if (!chRes.ok) throw new Error('Channel API Error');
    const chData = await chRes.json();

    const channels = (chData.items || [])
      .map(ch => ({
        id: ch.id,
        name: ch.snippet?.title || '',
        thumb: ch.snippet?.thumbnails?.default?.url || '',
        desc: ch.snippet?.description || '',
        subs: parseInt(ch.statistics?.subscriberCount || 0),
        totalViews: parseInt(ch.statistics?.viewCount || 0),
        videoCount: parseInt(ch.statistics?.videoCount || 0),
      }))
      .sort((a, b) => b.subs - a.subs);

    cache[ckey] = channels;
    renderSubscribers(channels);
  } catch(e) {
    document.getElementById('subsList').innerHTML = `<div class="err-box"><div style="font-size:32px;margin-bottom:8px">⚠️</div><p>구독자 데이터를 불러오지 못했어요.</p></div>`;
  } finally {
    document.getElementById('refreshBtn').classList.remove('loading');
    document.getElementById('statusBar').classList.remove('on');
  }
}

function renderSubscribers(channels) {
  const medals = ['🥇','🥈','🥉'];
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('subsList').innerHTML = channels.map((ch,i) => `
    <div class="ch-card r${i<3?i+1:''}" onclick="window.open('https://youtube.com/channel/${ch.id}','_blank')">
      <div class="ch-rank">${i<3?`<span class="ch-medal">${medals[i]}</span>`:`#${i+1}`}</div>
      ${ch.thumb ? `<img class="ch-avatar" src="${ch.thumb}" onerror="this.style.display='none'" loading="lazy">` : `<div class="ch-avatar-ph">📺</div>`}
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-meta">총 조회수 ${fmt(ch.totalViews)} · 영상 ${fmt(ch.videoCount)}개</div>
        <div class="ch-tags">
          ${ch.subs >= 1e7 ? '<span class="ch-badge">👑 1000만+</span>' : ''}
          ${ch.subs >= 1e6 && ch.subs < 1e7 ? '<span class="ch-badge">💎 100만+</span>' : ''}
          ${ch.subs >= 1e5 && ch.subs < 1e6 ? '<span class="ch-badge">🔥 10만+</span>' : ''}
          <span class="ch-badge">급상승</span>
        </div>
      </div>
      <div class="ch-stats">
        <div><div class="ch-views" style="color:var(--accent2)">${fmt(ch.subs)}</div><div class="ch-views-label">구독자</div></div>
        <div class="ch-video-count">📹 ${fmt(ch.videoCount)}개 영상</div>
        <div class="ch-heat">👁 ${fmt(ch.totalViews)} 총뷰</div>
      </div>
    </div>`).join('');
  document.getElementById('sectionTitle').textContent = `${activeCountry.flag} ${activeCountry.name} 구독자 순위`;
  document.getElementById('updateBadge').textContent = now + ' 기준';
  document.getElementById('statVideos').textContent = channels.length;
  document.getElementById('statViews').textContent = fmt(channels.reduce((s,c)=>s+c.subs,0));
  document.getElementById('statRegion').textContent = activeCountry.flag + ' ' + activeCountry.name;
  document.getElementById('statTime').textContent = now;
}

function doRefresh() {
  const vkey = activeCountry.code + '_' + activeCat.id;
  delete cache[vkey];
  delete cache['ch_' + vkey];
  delete cache['subs_' + vkey];
  if (viewMode === 'video') fetchVideos();
  else if (viewMode === 'channel') fetchChannels();
  else fetchSubscribers();
}

function parseDur(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h=parseInt(m[1]||0), mn=parseInt(m[2]||0), s=parseInt(m[3]||0);
  return h>0 ? `${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${mn}:${String(s).padStart(2,'0')}`;
}

function fmt(n) {
  if (n>=1e8) return (n/1e8).toFixed(1)+'억';
  if (n>=1e4) return Math.round(n/1e4)+'만';
  if (n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function ago(d) {
  const diff = (Date.now()-new Date(d))/1000;
  if (diff<3600) return Math.floor(diff/60)+'분 전';
  if (diff<86400) return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 초기 로드
fetchVideos();
</script>
</body>
</html>
